<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thinguva Sentinel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; }
  header { background: #1a1d2e; padding: 20px 40px; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 22px; font-weight: 600; color: #fff; }
  header span { background: #6c63ff; color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 30px 40px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .stat-card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 12px; padding: 20px; }
  .stat-card .label { font-size: 12px; color: #718096; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 32px; font-weight: 700; }
  .stat-card.allowed .value { color: #48bb78; }
  .stat-card.blocked .value { color: #fc8181; }
  .stat-card.loops .value { color: #f6ad55; }
  .stat-card.total .value { color: #63b3ed; }
  .section { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .section h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #fff; }
  .test-bar { display: flex; gap: 10px; margin-bottom: 20px; }
  .test-bar input { flex: 1; background: #0f1117; border: 1px solid #2d3748; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; }
  .test-bar button { background: #6c63ff; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; }
  .test-bar button:hover { background: #5a52d5; }
  .result { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
  .result.allowed { background: #1c3a2a; border: 1px solid #48bb78; color: #48bb78; }
  .result.blocked { background: #3a1c1c; border: 1px solid #fc8181; color: #fc8181; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; color: #718096; font-weight: 500; border-bottom: 1px solid #2d3748; font-size: 11px; text-transform: uppercase; }
  td { padding: 10px 12px; border-bottom: 1px solid #1e2535; color: #cbd5e0; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.ALLOWED { background: #1c3a2a; color: #48bb78; }
  .badge.BLOCKED { background: #3a1c1c; color: #fc8181; }
  .badge.LOOP_DETECTED { background: #3a2e1c; color: #f6ad55; }
  .refresh-btn { background: #2d3748; color: #e2e8f0; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; float: right; margin-top: -40px; }
  .refresh-btn:hover { background: #3d4a5c; }
  .empty { color: #4a5568; text-align: center; padding: 30px; font-size: 14px; }
</style>
</head>
<body>
<header>
  <h1>Thinguva Sentinel</h1>
  <span>LIVE</span>
</header>
<div class="container">
  <div class="stats">
    <div class="stat-card total"><div class="label">Total Actions</div><div class="value" id="total">0</div></div>
    <div class="stat-card allowed"><div class="label">Allowed</div><div class="value" id="allowed">0</div></div>
    <div class="stat-card blocked"><div class="label">Blocked</div><div class="value" id="blocked">0</div></div>
    <div class="stat-card loops"><div class="label">Loops Detected</div><div class="value" id="loops">0</div></div>
  </div>

  <div class="section">
    <h2>Test Agent Action</h2>
    <div class="test-bar">
      <input type="text" id="action-input" placeholder="Type an agent action e.g. delete all records, summarize report..." />
      <button onclick="testAction()">Run Action</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <div class="section">
    <h2>Audit Log</h2>
    <button class="refresh-btn" onclick="loadLogs()">Refresh</button>
    <table>
      <thead><tr><th>Time</th><th>Action</th><th>Status</th><th>Reason</th></tr></thead>
      <tbody id="log-table"><tr><td colspan="4" class="empty">No actions yet</td></tr></tbody>
    </table>
  </div>
</div>

<div class="section">
    <h2>Compliance Report</h2>
    <p style="color:#718096;font-size:14px;margin-bottom:16px">Generate a full PDF compliance report of all agent activity — ready for regulators and auditors.</p>
    <a href="/api/report/generate" target="_blank">
      <button style="background:#6c63ff;color:#fff;border:none;border-radius:8px;padding:12px 24px;cursor:pointer;font-size:14px;font-weight:500">
        Download Compliance Report (PDF)
      </button>
    </a>
  </div>

<script>
async function loadStats() {
  const res = await fetch('/api/stats');
  const data = await res.json();
  document.getElementById('total').textContent = data.total_actions;
  document.getElementById('allowed').textContent = data.allowed;
  document.getElementById('blocked').textContent = data.blocked;
  document.getElementById('loops').textContent = data.loops_detected;
}

async function loadLogs() {
  const res = await fetch('/api/logs');
  const data = await res.json();
  const tbody = document.getElementById('log-table');
  if (data.logs.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No actions yet — run a test above</td></tr>';
    return;
  }
  tbody.innerHTML = data.logs.map(log => `
    <tr>
      <td>${log.timestamp.replace('T', ' ').split('.')[0]}</td>
      <td>${JSON.parse(log.action).args || ''}</td>
      <td><span class="badge ${log.status}">${log.status}</span></td>
      <td>${log.reason || '—'}</td>
    </tr>
  `).join('');
}

async function testAction() {
  const input = document.getElementById('action-input').value;
  if (!input) return;
  const res = await fetch('/api/test/action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action: input})
  });
  const data = await res.json();
  const result = document.getElementById('result');
  result.style.display = 'block';
  result.className = `result ${data.status.toLowerCase()}`;
  result.textContent = data.status === 'ALLOWED'
    ? `✓ Allowed — ${data.result}`
    : `✗ ${data.status} — ${data.reason}`;
  loadStats();
  loadLogs();
}

document.getElementById('action-input').addEventListener('keypress', e => {
  if (e.key === 'Enter') testAction();
});

loadStats();
loadLogs();
setInterval(() => { loadStats(); loadLogs(); }, 5000);
</script>
</body>
</html>
